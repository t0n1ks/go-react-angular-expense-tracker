<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-logo">{{ 'nav.app_title' | translate }}</div>

    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        {{ 'nav.home' | translate }}
      </a>
      <a routerLink="/categories" routerLinkActive="active" class="nav-item">
        {{ 'nav.categories' | translate }}
      </a>
      <a routerLink="/transactions" routerLinkActive="active" class="nav-item">
        {{ 'nav.transactions' | translate }}
      </a>
      <a routerLink="/statistics" routerLinkActive="active" class="nav-item">
        {{ 'nav.statistics' | translate }}
      </a>
    </nav>

    <app-language-switcher />

    <button class="theme-toggle-btn" (click)="toggleTheme()" [title]="(isDark ? 'theme.toggle_light' : 'theme.toggle_dark') | translate">
      <span>{{ isDark ? '☀' : '🌙' }}</span>
      {{ (isDark ? 'theme.toggle_light' : 'theme.toggle_dark') | translate }}
    </button>

    <div class="user-info">
      <span class="user-info-label">{{ 'nav.user_label' | translate }}</span>
      <span class="user-info-name">{{ username }}</span>
    </div>

    <button class="logout-button" (click)="logout()">
      {{ 'nav.logout' | translate }}
    </button>
  </aside>

  <main class="main-content">
    <router-outlet />
  </main>
</div>
