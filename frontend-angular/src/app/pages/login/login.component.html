<div class="auth-page">
  <div class="auth-card">
    <h2 class="auth-title">{{ 'auth.login_title' | translate }}</h2>

    @if (error()) {
      <div class="auth-error" role="alert">{{ error() | translate }}</div>
    }

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div class="auth-field">
        <label class="auth-label" for="username">{{ 'auth.username' | translate }}</label>
        <input
          class="auth-input"
          id="username"
          type="text"
          [placeholder]="'auth.username_ph' | translate"
          [(ngModel)]="username"
          name="username"
          required
        />
      </div>

      <div class="auth-field">
        <label class="auth-label" for="password">{{ 'auth.password' | translate }}</label>
        <input
          class="auth-input"
          id="password"
          type="password"
          [placeholder]="'auth.password_ph' | translate"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

      <button type="submit" class="auth-submit-button">{{ 'auth.login_btn' | translate }}</button>
    </form>

    <div class="auth-footer">
      <a routerLink="/register" class="auth-link">{{ 'auth.no_account' | translate }}</a>
    </div>
  </div>
</div>
